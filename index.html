<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unit Converter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Unit Converter</h1>

    <!-- WEIGHT -->
    <section class="row weight">
      <h2>Weight</h2>
      <div class="fields">
        <label>
          <span>Kilograms</span>
          <input type="number" id="kg" placeholder="kg" />
        </label>
        <label>
          <span>Grams</span>
          <input type="number" id="g" placeholder="g" />
        </label>
        <label>
          <span>Pounds</span>
          <input type="number" id="lb" placeholder="lb" />
        </label>
        <label>
          <span>Ounces</span>
          <input type="number" id="oz" placeholder="oz" />
        </label>
      </div>
    </section>

    <!-- LENGTH -->
    <section class="row length">
      <h2>Length</h2>
      <div class="fields">
        <label>
          <span>Meters</span>
          <input type="number" id="m" placeholder="m" />
        </label>
        <label>
          <span>Centimeters</span>
          <input type="number" id="cm" placeholder="cm" />
        </label>
        <label>
          <span>Kilometers</span>
          <input type="number" id="km" placeholder="km" />
        </label>
        <label>
          <span>Feet</span>
          <input type="number" id="ft" placeholder="ft" />
        </label>
        <label>
          <span>Inches</span>
          <input type="number" id="inch" placeholder="in" />
        </label>
        <label>
          <span>Miles</span>
          <input type="number" id="mi" placeholder="mi" />
        </label>
      </div>
    </section>

    <!-- TEMPERATURE -->
    <section class="row temp">
      <h2>Temperature</h2>
      <div class="fields">
        <label>
          <span>Celsius</span>
          <input type="number" id="c" placeholder="°C" />
        </label>
        <label>
          <span>Fahrenheit</span>
          <input type="number" id="f" placeholder="°F" />
        </label>
        <label>
          <span>Kelvin</span>
          <input type="number" id="k" placeholder="K" />
        </label>
      </div>
    </section>
  </div>

  <script src="converter.js"></script>
</body>
</html>
